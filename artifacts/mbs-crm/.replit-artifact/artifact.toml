kind = "web"
previewPath = "/"
title = "MBS CRM"
version = "1.0.0"
id = "artifacts/mbs-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20601

[services.development]
run = "pnpm --filter @workspace/mbs-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mbs-crm", "run", "build" ]
publicDir = "artifacts/mbs-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20601"
BASE_PATH = "/"
