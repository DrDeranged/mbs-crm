  /flyer-templates/{id}:
    get:
      operationId: getFlyerTemplate
      tags: [flyers]
      summary: Get a single flyer template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flyer template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlyerTemplate"
        "404":
          description: Not found
    put:
      operationId: updateFlyerTemplate
      tags: [flyers]
      summary: Update a flyer template (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlyerTemplateInput"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlyerTemplate"

  /flyers/generate:
    post:
      operationId: generateFlyer
      tags: [flyers]
      summary: Generate a PDF flyer from a template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateFlyerInput"
      responses:
        "200":
          description: Generated flyer info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateFlyerResponse"

  /flyers/{id}/download:
    get:
      operationId: downloadFlyer
      tags: [flyers]
      summary: Download a generated flyer PDF
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /flyers/{id}/email:
    post:
      operationId: emailFlyer
      tags: [flyers]
      summary: Email a generated flyer to a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailFlyerInput"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /flyers/{id}:
    get:
      operationId: getGeneratedFlyer
      tags: [flyers]
      summary: Get a generated flyer record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated flyer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedFlyer"

  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

