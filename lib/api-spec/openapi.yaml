openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MBS CRM API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: leads
    description: Lead management
  - name: notes
    description: Lead notes
  - name: tasks
    description: Lead tasks
  - name: documents
    description: Lead documents
  - name: activity
    description: Activity log
  - name: dashboard
    description: Dashboard analytics
  - name: storage
    description: Object storage
  - name: twilio
    description: Twilio voice and SMS communication
  - name: communications
    description: Lead communication history
  - name: email
    description: Email templates, sending, and tracking
  - name: drip
    description: Drip sequences and enrollment
  - name: sendgrid
    description: SendGrid event webhooks
  - name: analytics
    description: KPI analytics and reporting
  - name: lenders
    description: Lender management and matching engine
  - name: flyers
    description: Flyer template management and PDF generation
  - name: applications
    description: Public application intake and bank statement financials
  - name: credit
    description: Credit bureau (Experian) pulls, consent capture, and compliance log
  - name: workflow-rules
    description: Automated workflow rules that trigger tasks or notifications on status change
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /me/push-token:
    put:
      operationId: updateMyPushToken
      tags: [auth]
      summary: Store or clear Expo push notification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pushToken:
                  type: ["string", "null"]
      responses:
        "204":
          description: Token stored
        "401":
          description: Unauthorized

  /me/mobile:
    put:
      operationId: updateMyMobile
      tags: [auth]
      summary: Update current user's call-forwarding mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mobileNumber:
                  type: ["string", "null"]
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (for assignment dropdown)
      parameters:
        - name: role
          in: query
          schema:
            type: string
            enum: [admin, manager, rep]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}:
    put:
      operationId: updateUser
      tags: [users]
      summary: Update user role (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/push-token:
    put:
      operationId: updateUserPushToken
      tags: [users]
      summary: Store or clear push token for own account (own user only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pushToken:
                  type: ["string", "null"]
      responses:
        "204":
          description: Token stored
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (can only update own token)

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads with search/filter/pagination
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: applicationType
          in: query
          schema:
            type: string
        - name: repId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
        - name: sortBy
          in: query
          schema:
            type: string
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: minScore
          in: query
          description: Filter leads with score >= minScore
          schema:
            type: integer
        - name: maxScore
          in: query
          description: Filter leads with score <= maxScore
          schema:
            type: integer
      responses:
        "200":
          description: Paginated lead list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadListResponse"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead (with duplicate check)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "409":
          description: Duplicate detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateResponse"

  /leads/import/preview:
    post:
      operationId: previewImport
      tags: [leads]
      summary: Upload a CSV or XLSX file and get back headers plus first 5 rows for mapping review
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreviewResult"
        "400":
          description: Invalid file

  /leads/import:
    post:
      operationId: importLeads
      tags: [leads]
      summary: Bulk import leads from a CSV or XLSX file with optional column mapping
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                columnMapping:
                  type: string
                  description: JSON-encoded object mapping file column names to lead field names
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Invalid file

  /leads/capture:
    post:
      operationId: captureLeadFromWebsite
      tags: [leads]
      summary: Public endpoint for website lead capture (no auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadCaptureInput"
      responses:
        "201":
          description: Lead captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadCaptureResponse"
        "409":
          description: Duplicate detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateResponse"

  /leads/export:
    get:
      operationId: exportLeads
      tags: [leads]
      summary: Export leads as CSV (respects current filter params, or specific IDs)
      parameters:
        - name: ids
          in: query
          description: Comma-separated lead IDs to export (if omitted, exports all matching filter)
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: applicationType
          in: query
          schema:
            type: string
        - name: repId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "401":
          description: Unauthorized

  /leads/bulk/status:
    post:
      operationId: bulkUpdateLeadStatus
      tags: [leads]
      summary: Change status on up to 500 leads (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, status]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  maxItems: 500
                status:
                  type: string
      responses:
        "200":
          description: Bulk status change result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        "400":
          description: Invalid request
        "403":
          description: Forbidden

  /leads/bulk/assign:
    post:
      operationId: bulkAssignLeads
      tags: [leads]
      summary: Reassign up to 500 leads to a rep (manager/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids, repId]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  maxItems: 500
                repId:
                  type: integer
      responses:
        "200":
          description: Bulk assign result
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        "400":
          description: Invalid request
        "403":
          description: Forbidden

  /leads/bulk/delete:
    post:
      operationId: bulkDeleteLeads
      tags: [leads]
      summary: Delete up to 500 leads (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  maxItems: 500
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
        "400":
          description: Invalid request
        "403":
          description: Forbidden

  /leads/{id}/score:
    post:
      operationId: recalculateLeadScore
      tags: [leads]
      summary: Recalculate and save the automated lead score (0-100)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Score result
          content:
            application/json:
              schema:
                type: object
                required: [leadId, leadScore, leadScoreBreakdown]
                properties:
                  leadId:
                    type: integer
                  leadScore:
                    type: integer
                  leadScoreBreakdown:
                    type: object
        "401":
          description: Unauthorized
        "404":
          description: Lead not found

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get lead detail with related data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadDetail"
        "404":
          description: Not found
    put:
      operationId: updateLead
      tags: [leads]
      summary: Update lead fields
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/status:
    put:
      operationId: changeLeadStatus
      tags: [leads]
      summary: Change lead status (logs to history and activity)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusChange"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/assign:
    put:
      operationId: assignLead
      tags: [leads]
      summary: Reassign lead to a different rep (manager/admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignLead"
      responses:
        "200":
          description: Lead reassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}/notes:
    get:
      operationId: listNotes
      tags: [notes]
      summary: List notes for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Note"
    post:
      operationId: createNote
      tags: [notes]
      summary: Add a note to a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteInput"
      responses:
        "201":
          description: Note created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"

  /leads/{id}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Add a task to a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (mark complete, edit)
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /leads/{id}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid file or unsupported type

  /documents/{docId}/download:
    get:
      operationId: downloadDocument
      tags: [documents]
      summary: Get a signed download URL for a document
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DownloadUrlResponse"

  /leads/{id}/activity:
    get:
      operationId: listLeadActivity
      tags: [activity]
      summary: Get chronological activity log for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Pipeline counts per stage, recent leads and rep breakdown
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/rep:
    get:
      operationId: getRepDashboard
      tags: [dashboard]
      summary: Rep-specific dashboard (my leads, tasks due, recent activity)
      responses:
        "200":
          description: Rep dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepDashboard"

  /dashboard/my-tasks:
    get:
      operationId: getMyTasks
      tags: [dashboard]
      summary: Current user's tasks due today, this week, and overdue
      responses:
        "200":
          description: Tasks summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyTasksSummary"

  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: KPI summary — total leads, applications, approvals, fundings, conversion rate, avg funding time
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: rep_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"
        "401":
          description: Unauthorized

  /analytics/pipeline:
    get:
      operationId: getAnalyticsPipeline
      tags: [analytics]
      summary: Lead count per funnel stage with conversion rates
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: rep_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Pipeline funnel data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsPipeline"
        "401":
          description: Unauthorized

  /analytics/reps:
    get:
      operationId: getAnalyticsReps
      tags: [analytics]
      summary: Per-rep performance metrics (manager/admin only)
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Rep performance table
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RepPerformance"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /analytics/sources:
    get:
      operationId: getAnalyticsSources
      tags: [analytics]
      summary: Lead volume and conversion by source
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: rep_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Source analytics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceAnalytics"
        "401":
          description: Unauthorized

  /applications/submit:
    post:
      operationId: submitApplication
      tags: [applications]
      summary: Public application submit (no auth, multipart, rate-limited)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, ownerFirstName, ownerLastName, businessName]
              properties:
                type:
                  type: string
                  enum: [equipment, working_capital]
                ownerFirstName:
                  type: string
                ownerLastName:
                  type: string
                businessName:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                ein:
                  type: string
                ownerSsn:
                  type: string
                ownerDob:
                  type: string
                signatureData:
                  type: string
                bankStatements:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmitResponse"
        "409":
          description: Duplicate lead detected

  /leads/{id}/application:
    get:
      operationId: getLeadApplication
      tags: [applications]
      summary: Get the submitted application for a lead (SSN masked)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationRecord"
        "404":
          description: Not found

  /leads/{id}/financials:
    get:
      operationId: getLeadFinancials
      tags: [applications]
      summary: Get bank statement OCR financials for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financials summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialsResponse"
        "404":
          description: Not found

  /analytics/communications:
    get:
      operationId: getAnalyticsCommunications
      tags: [analytics]
      summary: Daily or weekly call and SMS volume over the selected period
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: rep_id
          in: query
          schema:
            type: integer
        - name: granularity
          in: query
          schema:
            type: string
            enum: [daily, weekly]
            default: daily
      responses:
        "200":
          description: Communication activity time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommActivity"
        "401":
          description: Unauthorized

  /twilio/token:
    post:
      operationId: getTwilioToken
      tags: [twilio]
      summary: Generate a Twilio Access Token for the Voice SDK (browser softphone)
      responses:
        "200":
          description: Twilio access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwilioTokenResponse"
        "401":
          description: Unauthorized
        "503":
          description: Twilio not configured

  /twilio/voice:
    post:
      operationId: twilioVoiceTwiml
      tags: [twilio]
